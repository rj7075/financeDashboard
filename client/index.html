<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Title (VERY IMPORTANT) -->
    <title>Finance Dashboard | Track Income & Expenses Easily</title>

    <!-- SEO Meta -->
    <meta
      name="description"88
      content="A modern finance dashboard to track income, expenses, and financial insights. Built with React for fast and seamless performance."
    />
    <meta
      name="keywords"
      content="finance dashboard, expense tracker, income tracker, react dashboard, money management app"
    />
    <meta name="author" content="Ranjeet Yadav" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:title" content="Finance Dashboard" />
    <meta
      property="og:description"
      content="Track your income and expenses with a clean and modern dashboard UI."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:image" content="/preview.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Finance Dashboard" />
    <meta
      name="twitter:description"
      content="Manage your finances with ease using this React dashboard."
    />
    <meta name="twitter:image" content="/preview.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/zorvyn.png" />

    <!-- Fonts (optional but good) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com/" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>

    <!-- No JS fallback -->
    <noscript>
      <p>This app requires JavaScript to run properly.</p>
    </noscript>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
